[project]
name = "imaging-common"
version = "0.1.0"
description = "Shared infrastructure for imaging pipeline services"
requires-python = ">=3.12"
dependencies = [
    "psycopg2-binary>=2.9.6",
    "pyyaml>=6.0.1",
    "requests>=2.32.0",
    "croniter",
    "pydantic-settings",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/imaging_common"]
